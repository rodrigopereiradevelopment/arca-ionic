<ion-content [fullscreen]="true">

  <div class="topo">
    <img src="assets/img/logo.png" class="logo" alt="ARCA Logo">
  </div>

  <div class="container">

    <h1>Bem-vindo! 👋</h1>
    <p class="subtitulo">Entre na sua conta ARCA</p>

    <div class="form-group">
      <label>E-mail</label>
      <input type="email" [(ngModel)]="email" placeholder="seu@email.com">
    </div>

    <div class="form-group">
      <label>Senha</label>
      <div class="senha-row">
        <input [type]="mostrarSenha ? 'text' : 'password'"
          [(ngModel)]="senha" placeholder="Sua senha">
        <button class="btn-olho" (click)="mostrarSenha = !mostrarSenha">
          {{ mostrarSenha ? '🙈' : '👁️' }}
        </button>
      </div>
    </div>

    <button class="btn-entrar" (click)="login()" [disabled]="carregando">
      {{ carregando ? 'Entrando...' : 'Entrar' }}
    </button>

    <a routerLink="/cadastro" class="link-cadastro">
      Não tem conta? <strong>Cadastre-se</strong>
    </a>

    <!-- ATALHOS PARA TESTE -->
    <div class="atalhos">
      <p class="atalhos-titulo">Acesso rápido para testes:</p>
      <div class="atalhos-btns">
        <button *ngFor="let a of acessos" class="btn-atalho"
          (click)="preencherEmail(a.email)">
          {{ a.tipo }}
        </button>
      </div>
    </div>

  </div>

</ion-content>
