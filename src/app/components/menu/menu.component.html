<ion-menu side="start" contentId="main-content">
  <ion-header>
    <ion-toolbar>
      <ion-title>Menu</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content>
    <div class="menu-profile" style="padding: 20px; display: flex; align-items: center; gap: 10px;">
      <ion-avatar>
        <img src="assets/img/usuario.png" alt="Usuário">
      </ion-avatar>
      <div class="user-info">
        <strong>Nome do Usuário</strong>
        <p style="font-size: 0.8em;">email@exemplo.com</p>
      </div>
    </div>

    <ion-list>
      <ion-item button routerLink="/home">
        <ion-icon name="home-outline" slot="start"></ion-icon>
        <ion-label>Início</ion-label>
      </ion-item>

      <ion-item button routerLink="/pesquisar">
        <ion-icon name="search-outline" slot="start"></ion-icon>
        <ion-label>Pesquisar Produtos</ion-label>
      </ion-item>

      <ion-item button routerLink="/mercados">
        <ion-icon name="business-outline" slot="start"></ion-icon>
        <ion-label>Mercados Próximos</ion-label>
      </ion-item>

      <ion-item-divider></ion-item-divider>

      <ion-item button routerLink="/configuracoes">
        <ion-icon name="settings-outline" slot="start"></ion-icon>
        <ion-label>Configurações</ion-label>
      </ion-item>

      <ion-item button (click)="logout()">
        <ion-icon name="log-out-outline" slot="start" color="danger"></ion-icon>
        <ion-label color="danger">Sair</ion-label>
      </ion-item>
    </ion-list>
  </ion-content>
</ion-menu>
