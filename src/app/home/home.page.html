<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-searchbar
      placeholder="Categoria / Produto"
      showCancelButton="never">
    </ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="false">
  <div class="home-container">
    
<!--Trocar os baners por encartes de oferta reais-->
    <swiper-container loop="true" autoplay="true" pagination="true"
      slides-per-view="2" space-between="8" class="banner-top"
      breakpoints='{"768": {"slidesPerView": 3}, "1024": {"slidesPerView": 4}}'>
      <swiper-slide><img src="assets/img/Compare1.png" alt="Banner 1"></swiper-slide>
      <swiper-slide><img src="assets/img/Compare.png" alt="Banner 2"></swiper-slide>
      <swiper-slide><img src="assets/img/Descontos.png" alt="Banner 3"></swiper-slide>
      <swiper-slide><img src="assets/img/Descubra.png" alt="Banner 4"></swiper-slide>
      <swiper-slide><img src="assets/img/Economia.png" alt="Banner 5"></swiper-slide>
      <swiper-slide><img src="assets/img/Ofertas.png" alt="Banner 6"></swiper-slide>
    </swiper-container>

    <swiper-container loop="true" autoplay="true" pagination="true"
      slides-per-view="1.05" space-between="12" class="banner-promo"
      breakpoints='{"768": {"slidesPerView": 2}, "1024": {"slidesPerView": 2.5}}'>
      <swiper-slide><img src="assets/img/Promocao3.png" alt="Promo 1"></swiper-slide>
      <swiper-slide><img src="assets/img/Promocao1.png" alt="Promo 2"></swiper-slide>
      <swiper-slide><img src="assets/img/Promocao.png" alt="Promo 3"></swiper-slide>
      <swiper-slide><img src="assets/img/Promocao2.png" alt="Promo 4"></swiper-slide>
    </swiper-container>

  </div>
</ion-content>

<app-footer></app-footer>
<app-modal-carrinho></app-modal-carrinho>
